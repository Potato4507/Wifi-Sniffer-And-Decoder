name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q wifi_pipeline

      - name: Run tests
        run: python -m pytest -q

      - name: Build wheel and source distribution
        run: python -m build

      - name: Build portable release archive
        run: python scripts/build_release.py

      - name: Enforce real validation matrix gate
        shell: bash
        run: |
          SAMPLE_ARGS=()
          while IFS= read -r path; do
            SAMPLE_ARGS+=(--sample-report "$path")
          done < <(find validation_matrix -maxdepth 1 -type f -name 'sample*_analysis.json' | sort)
          python scripts/release_gate.py "${SAMPLE_ARGS[@]}" --write-summary dist/release-gate.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

      - name: Publish GitHub release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
